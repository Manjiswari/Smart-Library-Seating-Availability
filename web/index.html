<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Smart Library Seat Availability</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>📚 Smart Library</h1>

        <h2>Seat Availability Dashboard</h2>

        <div class="card">

            <h3>Total Seats</h3>

            <p id="total">0</p>

        </div>

        <div class="card">

            <h3>Available Seats</h3>

            <p id="available">0</p>

        </div>

        <div class="card">

            <h3>Occupied Seats</h3>

            <p id="occupied">0</p>

        </div>

        <div class="status">

            <div>

                Seat 1

                <span id="seat1" class="free">Free</span>

            </div>

            <div>

                Seat 2

                <span id="seat2" class="free">Free</span>

            </div>

            <div>

                Seat 3

                <span id="seat3" class="free">Free</span>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
